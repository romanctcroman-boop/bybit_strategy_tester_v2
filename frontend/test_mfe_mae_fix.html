<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест исправления MFE/MAE</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
            margin: 0;
        }
        h1 { color: #26a69a; }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .chart-container {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            height: 600px;
        }
        .info-panel {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .info-panel h2 {
            color: #58a6ff;
            margin-top: 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #30363d;
        }
        th {
            background: #0d1117;
            color: #58a6ff;
            font-weight: 600;
        }
        tr:hover {
            background: #1c2128;
        }
        .status-ok { color: #26a69a; }
        .status-error { color: #ef5350; }
        .status-warning { color: #ff9800; }
        .metric {
            display: inline-block;
            margin-right: 20px;
            padding: 10px 15px;
            background: #0d1117;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        .metric-label {
            color: #787b86;
            font-size: 12px;
        }
        .metric-value {
            font-size: 18px;
            font-weight: bold;
            color: #26a69a;
        }
        .metric-value.error {
            color: #ef5350;
        }
        button {
            background: #26a69a;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
        }
        button:hover {
            background: #1e8a7a;
        }
        button.secondary {
            background: #30363d;
        }
        button.secondary:hover {
            background: #404852;
        }
        #log {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 4px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 15px;
        }
        .log-entry {
            margin-bottom: 5px;
            padding: 3px 0;
        }
        .log-info { color: #787b86; }
        .log-success { color: #26a69a; }
        .log-error { color: #ef5350; }
        .log-warning { color: #ff9800; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Тест исправления MFE/MAE</h1>
        <p>Проверка корректности отображения баров MFE/MAE на графике equity curve</p>

        <div>
            <button onclick="loadData()">📊 Загрузить данные</button>
            <button class="secondary" onclick="runTests()">🧪 Запустить тесты</button>
            <button class="secondary" onclick="clearLog()">🗑️ Очистить лог</button>
        </div>

        <div class="info-panel">
            <h2>📈 Статистика</h2>
            <div id="stats"></div>
        </div>

        <div class="chart-container">
            <div id="chart"></div>
        </div>

        <div class="info-panel">
            <h2>📋 Детали сделок (первые 20)</h2>
            <table id="tradesTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Время выхода</th>
                        <th>Side</th>
                        <th>P&L</th>
                        <th>MFE ($)</th>
                        <th>MAE ($)</th>
                        <th>MFE (%)</th>
                        <th>MAE (%)</th>
                        <th>Статус</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="info-panel">
            <h2>📝 Лог</h2>
            <div id="log"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@5/dist/lightweight-charts.standalone.production.js"></script>
    <script src="js/components/TradingViewEquityChart.js"></script>

    <script>
        let chartInstance = null;
        let currentData = null;

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const timestamp = new Date().toLocaleTimeString('ru-RU');
            entry.textContent = `[${timestamp}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
            log('Лог очищен', 'info');
        }

        function updateStats(data) {
            const statsDiv = document.getElementById('stats');
            const trades = data.trades || [];
            const equityCurve = data.equity_curve || {};

            const tradesWithMfe = trades.filter(t => t.mfe !== undefined && t.mfe !== null && t.mfe !== 0).length;
            const tradesWithMae = trades.filter(t => t.mae !== undefined && t.mae !== null && t.mae !== 0).length;
            const tradesWithMfePct = trades.filter(t => t.mfe_pct !== undefined && t.mfe_pct !== null && t.mfe_pct !== 0).length;
            const tradesWithMaePct = trades.filter(t => t.mae_pct !== undefined && t.mae_pct !== null && t.mae_pct !== 0).length;

            const equityPoints = equityCurve.timestamps?.length || 0;
            const matchRate = equityPoints > 0 ? ((trades.length / equityPoints) * 100).toFixed(2) : 0;

            statsDiv.innerHTML = `
                <div class="metric">
                    <div class="metric-label">Всего сделок</div>
                    <div class="metric-value">${trades.length}</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Точек equity curve</div>
                    <div class="metric-value">${equityPoints}</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Сделок с MFE ($)</div>
                    <div class="metric-value ${tradesWithMfe === trades.length ? '' : 'error'}">${tradesWithMfe}/${trades.length}</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Сделок с MAE ($)</div>
                    <div class="metric-value ${tradesWithMae === trades.length ? '' : 'error'}">${tradesWithMae}/${trades.length}</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Сделок с MFE (%)</div>
                    <div class="metric-value ${tradesWithMfePct === trades.length ? '' : 'error'}">${tradesWithMfePct}/${trades.length}</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Сделок с MAE (%)</div>
                    <div class="metric-value ${tradesWithMaePct === trades.length ? '' : 'error'}">${tradesWithMaePct}/${trades.length}</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Соотношение сделки/бары</div>
                    <div class="metric-value">${matchRate}%</div>
                </div>
            `;
        }

        function updateTradesTable(data) {
            const tbody = document.querySelector('#tradesTable tbody');
            const trades = (data.trades || []).slice(0, 20);

            tbody.innerHTML = trades.map((t, i) => {
                const hasMfe = t.mfe !== undefined && t.mfe !== null && t.mfe !== 0;
                const hasMae = t.mae !== undefined && t.mae !== null && t.mae !== 0;
                const hasMfePct = t.mfe_pct !== undefined && t.mfe_pct !== null && t.mfe_pct !== 0;
                const hasMaePct = t.mae_pct !== undefined && t.mae_pct !== null && t.mae_pct !== 0;

                let status = '✅';
                const issues = [];
                if (!hasMfe && !hasMfePct) issues.push('нет MFE');
                if (!hasMae && !hasMaePct) issues.push('нет MAE');
                if (issues.length > 0) {
                    status = `<span class="status-warning">⚠️ ${issues.join(', ')}</span>`;
                }

                const exitTime = t.exit_time ? new Date(t.exit_time).toLocaleString('ru-RU') : 'N/A';
                const side = (t.side || t.direction || 'unknown').toUpperCase();
                const pnlClass = (t.pnl || 0) >= 0 ? 'status-ok' : 'status-error';

                return `
                    <tr>
                        <td>${i + 1}</td>
                        <td>${exitTime}</td>
                        <td>${side}</td>
                        <td class="${pnlClass}">${(t.pnl || 0).toFixed(2)}</td>
                        <td>${hasMfe ? t.mfe.toFixed(2) : '-'}</td>
                        <td>${hasMae ? Math.abs(t.mae).toFixed(2) : '-'}</td>
                        <td>${hasMfePct ? t.mfe_pct.toFixed(2) : '-'}</td>
                        <td>${hasMaePct ? Math.abs(t.mae_pct).toFixed(2) : '-'}</td>
                        <td>${status}</td>
                    </tr>
                `;
            }).join('');
        }

        async function loadData() {
            clearLog();
            log('Загрузка данных backtest...', 'info');

            try {
                // Используем тот же backtest ID, что и в debug_mfe.html
                const resp = await fetch('http://localhost:8000/api/v1/backtests/fd69829a-4ba9-4b11-acdc-e351d8d42ad2');

                if (!resp.ok) {
                    throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
                }

                const data = await resp.json();
                currentData = data;

                log(`Данные загручены: ${data.trades?.length || 0} сделок`, 'success');
                log(`Equity curve: ${data.equity_curve?.timestamps?.length || 0} точек`, 'success');

                updateStats(data);
                updateTradesTable(data);
                renderChart(data);

            } catch (error) {
                log(`Ошибка загрузки: ${error.message}`, 'error');
                console.error(error);
            }
        }

        function renderChart(data) {
            if (chartInstance) {
                chartInstance.destroy();
            }

            chartInstance = new TradingViewEquityChart('chart', {
                showBuyHold: false,
                showTradeExcursions: true,
                displayMode: 'absolute'
            });

            log('Рендеринг графика с MFE/MAE...', 'info');
            chartInstance.render(data);
            log('График отрисован', 'success');
        }

        function runTests() {
            if (!currentData) {
                log('Сначала загрузите данные!', 'error');
                return;
            }

            clearLog();
            log('=== ЗАПУСК ТЕСТОВ ===', 'info');

            const trades = currentData.trades || [];
            const equityCurve = currentData.equity_curve || {};
            const timestamps = equityCurve.timestamps || [];

            let passed = 0;
            let failed = 0;

            // Test 1: Все сделки имеют MFE/MAE
            log('Тест 1: Проверка наличия MFE/MAE во всех сделках...', 'info');
            let mfeMissing = 0;
            let maeMissing = 0;

            trades.forEach((t, i) => {
                const hasMfe = t.mfe !== undefined && t.mfe !== null && t.mfe !== 0;
                const hasMae = t.mae !== undefined && t.mae !== null && t.mae !== 0;
                const hasMfePct = t.mfe_pct !== undefined && t.mfe_pct !== null && t.mfe_pct !== 0;
                const hasMaePct = t.mae_pct !== undefined && t.mae_pct !== null && t.mae_pct !== 0;

                if (!hasMfe && !hasMfePct) {
                    mfeMissing++;
                    log(`Сделка #${i + 1}: отсутствует MFE`, 'warning');
                }
                if (!hasMae && !hasMaePct) {
                    maeMissing++;
                    log(`Сделка #${i + 1}: отсутствует MAE`, 'warning');
                }
            });

            if (mfeMissing === 0 && maeMissing === 0) {
                log('✅ Тест 1 пройден: Все сделки имеют MFE и MAE', 'success');
                passed++;
            } else {
                log(`❌ Тест 1 провален: ${mfeMissing} без MFE, ${maeMissing} без MAE`, 'error');
                failed++;
            }

            // Test 2: Временные метки exit_time корректны
            log('Тест 2: Проверка корректности exit_time...', 'info');
            let invalidExitTimes = 0;

            trades.forEach((t, i) => {
                if (!t.exit_time) {
                    invalidExitTimes++;
                    log(`Сделка #${i + 1}: отсутствует exit_time`, 'warning');
                } else {
                    const exitMs = new Date(t.exit_time).getTime();
                    if (isNaN(exitMs)) {
                        invalidExitTimes++;
                        log(`Сделка #${i + 1}: некорректный exit_time: ${t.exit_time}`, 'error');
                    }
                }
            });

            if (invalidExitTimes === 0) {
                log('✅ Тест 2 пройден: Все exit_time корректны', 'success');
                passed++;
            } else {
                log(`❌ Тест 2 провален: ${invalidExitTimes} некорректных exit_time`, 'error');
                failed++;
            }

            // Test 3: Equity curve timestamps корректны
            log('Тест 3: Проверка equity curve timestamps...', 'info');
            let invalidTimestamps = 0;

            timestamps.forEach((ts, i) => {
                const tsMs = new Date(ts).getTime();
                if (isNaN(tsMs)) {
                    invalidTimestamps++;
                    log(`Timestamp #${i}: некорректный: ${ts}`, 'error');
                }
            });

            if (invalidTimestamps === 0) {
                log('✅ Тест 3 пройден: Все timestamps корректны', 'success');
                passed++;
            } else {
                log(`❌ Тест 3 провален: ${invalidTimestamps} некорректных timestamps`, 'error');
                failed++;
            }

            // Test 4: MFE/MAE значения в разумных пределах
            log('Тест 4: Проверка разумности MFE/MAE значений...', 'info');
            let unreasonableValues = 0;

            trades.forEach((t, i) => {
                const mfe = Math.abs(t.mfe || 0);
                const mae = Math.abs(t.mae || 0);
                const pnl = Math.abs(t.pnl || 0);

                // MFE и MAE не должны превышать |PnL| более чем в 10 раз (разумный лимит)
                if (pnl > 0 && (mfe > pnl * 10 || mae > pnl * 10)) {
                    unreasonableValues++;
                    log(`Сделка #${i + 1}: подозрительные значения MFE=${mfe.toFixed(2)}, MAE=${mae.toFixed(2)}, PnL=${pnl.toFixed(2)}`, 'warning');
                }
            });

            if (unreasonableValues === 0) {
                log('✅ Тест 4 пройден: Все значения в разумных пределах', 'success');
                passed++;
            } else {
                log(`❌ Тест 4 провален: ${unreasonableValues} сделок с подозрительными значениями`, 'error');
                failed++;
            }

            // Test 5: Корректный маппинг exit_time → equity point
            log('Тест 5: Проверка маппинга exit_time → equity point...', 'info');
            let mappingIssues = 0;

            // Создаём карту timestamp → index
            const tsToIdx = new Map();
            timestamps.forEach((ts, i) => {
                const epoch = new Date(ts).getTime();
                if (!isNaN(epoch)) {
                    tsToIdx.set(epoch, i);
                }
            });

            // Проверяем, что каждый exit_time имеет соответствие в equity curve
            trades.forEach((t, i) => {
                if (!t.exit_time) return;

                const exitEpoch = new Date(t.exit_time).getTime();
                if (isNaN(exitEpoch)) return;

                // Ищем ближайший timestamp
                let found = false;
                for (const [tsEpoch, idx] of tsToIdx.entries()) {
                    const diff = Math.abs(tsEpoch - exitEpoch);
                    if (diff < 60000) { // В пределах 1 минуты
                        found = true;
                        break;
                    }
                }

                if (!found) {
                    mappingIssues++;
                    log(`Сделка #${i + 1}: exit_time ${t.exit_time} не найден в equity curve`, 'warning');
                }
            });

            if (mappingIssues === 0) {
                log('✅ Тест 5 пройден: Все exit_time маппятся на equity curve', 'success');
                passed++;
            } else {
                log(`❌ Тест 5 провален: ${mappingIssues} сделок без маппинга`, 'error');
                failed++;
            }

            // Итоговый отчёт
            log('=== ИТОГИ ===', 'info');
            log(`Пройдено: ${passed}`, 'success');
            log(`Провалено: ${failed}`, failed > 0 ? 'error' : 'success');

            if (failed === 0) {
                log('🎉 Все тесты пройдены!', 'success');
            } else {
                log('⚠️ Обнаружены проблемы. Проверьте лог выше.', 'warning');
            }
        }

        // Автозагрузка при старте
        window.addEventListener('DOMContentLoaded', () => {
            log('Страница загружена. Нажмите "Загрузить данные" для начала.', 'info');
        });
    </script>
</body>
</html>
