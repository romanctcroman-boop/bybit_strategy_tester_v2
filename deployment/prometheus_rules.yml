# Prometheus Alerting Rules
# For Bybit Strategy Tester v2

groups:
  - name: bybit_api_alerts
    interval: 30s
    rules:
      # API Health
      - alert: APIHighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High API error rate"
          description: "API error rate is {{ $value }} errors/sec"

      - alert: APISlowResponse
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API slow response time"
          description: "95th percentile response time is {{ $value }}s"

      # Backtest Health
      - alert: BacktestFailureRate
        expr: rate(backtest_failures_total[10m]) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High backtest failure rate"
          description: "Backtest failure rate is {{ $value }}/sec"

      # AI Agent Health
      - alert: AIAgentHighLatency
        expr: rate(ai_agent_request_duration_seconds_sum[5m]) / rate(ai_agent_request_duration_seconds_count[5m]) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "AI agent high latency"
          description: "Average AI agent latency is {{ $value }}s"

      - alert: AIAgentRateLimit
        expr: rate(ai_agent_rate_limited_total[5m]) > 0
        for: 2m
        labels:
          severity: info
        annotations:
          summary: "AI agent rate limiting"
          description: "AI agent requests being rate limited"

      # Cache Health
      - alert: CacheLowHitRate
        expr: cache_hits_total / (cache_hits_total + cache_misses_total) < 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low cache hit rate"
          description: "Cache hit rate is {{ $value | humanizePercentage }}"

      # Database Health
      - alert: DatabaseConnectionPoolExhausted
        expr: db_pool_available / db_pool_size < 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "Only {{ $value | humanizePercentage }} of DB pool available"

      # Cost Alerts
      - alert: HighDailyCost
        expr: sum(cost_usd_total) > 10
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "High daily AI cost"
          description: "Daily AI cost is ${{ $value }}"

      # System Health
      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value | humanizePercentage }}"

      - alert: HighDiskUsage
        expr: (node_filesystem_size_bytes - node_filesystem_avail_bytes) / node_filesystem_size_bytes > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High disk usage"
          description: "Disk usage is {{ $value | humanizePercentage }}"

      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value }}%"
