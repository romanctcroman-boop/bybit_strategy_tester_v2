# Grafana Datasources Provisioning
# For Bybit Strategy Tester v2

apiVersion: 1

datasources:
  # Prometheus - Primary metrics datasource
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: "POST"

  # Loki - Logs datasource (optional)
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    isDefault: false
