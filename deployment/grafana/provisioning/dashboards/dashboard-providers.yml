# Grafana Dashboards Provisioning
# For Bybit Strategy Tester v2

apiVersion: 1

providers:
  - name: 'Bybit Strategy Tester'
    orgId: 1
    folder: ''
    folderUid: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
